# Grafana datasource provisioning

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Sentinel
    type: grafana-simple-json-datasource
    access: proxy
    url: http://sentinel:8080/api
    editable: false
