# Prometheus configuration for Sentinel

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Sentinel API metrics
  - job_name: 'sentinel'
    static_configs:
      - targets: ['sentinel:8080']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (if deployed)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Ollama metrics (if available)
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: '/api/tags'
