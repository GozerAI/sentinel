# =============================================================================
# COO (Nexus) - Operations Orchestration
# =============================================================================
coo:
  cache_ttl: 60  # Shorter cache for coordination tasks

  model_pool:
    # FAST tier - Quick routing decisions
    - name: "llama3.1:8b"
      provider: "ollama"
      tier: "fast"
      host: "http://localhost:11434"
      max_tokens: 1024
      temperature: 0.3
      timeout: 20
      specializations: ["route", "classify", "priority"]
      max_concurrent: 15
      priority: 10

    # BALANCED tier - Planning and coordination
    - name: "mixtral:8x7b"
      provider: "ollama"
      tier: "balanced"
      host: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.5
      timeout: 60
      specializations: ["plan", "coordinate", "schedule"]
