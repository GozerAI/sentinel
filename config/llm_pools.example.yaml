# LLM Model Pool Configuration
# Each C-level executive has their own model pool optimized for their domain.
#
# Model Tiers:
#   - fast: Low latency, smaller models (7B) for real-time tasks
#   - balanced: Good quality/speed trade-off (13B-33B)
#   - quality: Best output quality (70B+ or cloud APIs)
#   - specialized: Domain-specific models
#
# Environment variables can be used for API keys:
#   api_key: "${ANTHROPIC_API_KEY}"

# =============================================================================
# CIO (Sentinel) - Infrastructure Operations
# =============================================================================
cio:
  cache_ttl: 300  # Cache responses for 5 minutes

  model_pool:
    # FAST tier - Real-time security and health operations
    - name: "mistral:7b-instruct"
      provider: "ollama"
      tier: "fast"
      host: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.3
      timeout: 30
      specializations: ["threat", "anomaly", "quick"]
      max_concurrent: 10
      priority: 10

    - name: "llama3.1:8b"
      provider: "ollama"
      tier: "fast"
      host: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.3
      timeout: 30
      specializations: ["health", "status"]
      max_concurrent: 10
      priority: 5

    # BALANCED tier - Analysis and forensics
    - name: "mixtral:8x7b"
      provider: "ollama"
      tier: "balanced"
      host: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.5
      timeout: 90
      specializations: ["log", "forensics", "pattern"]
      max_concurrent: 3
      priority: 10

    - name: "llama3.1:70b"
      provider: "ollama"
      tier: "balanced"
      host: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.5
      timeout: 120
      specializations: ["analysis", "reasoning"]
      max_concurrent: 2
      priority: 5

    # QUALITY tier - Complex decisions (cloud fallback)
    - name: "claude-3-5-haiku-20241022"
      provider: "anthropic"
      tier: "quality"
      api_key: "${ANTHROPIC_API_KEY}"
      max_tokens: 4096
      temperature: 0.7
      timeout: 120
      specializations: ["incident", "investigation", "decision"]
      max_concurrent: 5
      priority: 10

    - name: "claude-3-5-sonnet-20241022"
      provider: "anthropic"
      tier: "quality"
      api_key: "${ANTHROPIC_API_KEY}"
      max_tokens: 8192
      temperature: 0.7
      timeout: 180
      specializations: ["complex", "strategy"]
      max_concurrent: 3
      priority: 5

    # SPECIALIZED tier - Config generation
    - name: "codestral:22b"
      provider: "ollama"
      tier: "specialized"
      host: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.2
      timeout: 90
      specializations: ["config", "firewall", "routing", "script"]
      max_concurrent: 3
      priority: 10


